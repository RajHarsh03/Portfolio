    <style>
        /* Page-specific overrides */
        body {
            padding-top: 5rem;
        }

        .projects-page-header {
            max-width: 760px;
            margin: 0 auto 1.5rem;
            padding: 0 24px;
        }

        .projects-page-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: .35rem;
        }

        .projects-page-header p {
            color: var(--muted);
            font-size: .85rem;
            line-height: 1.6;
        }

        #allProjects {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 24px 6rem;
        }

        /* Toolbar row */
        .toolbar-row {
            display: flex;
            align-items: center;
            gap: .6rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        /* Search input */
        .toolbar-search {
            position: relative;
            flex: 1;
            min-width: 160px;
        }
        .toolbar-search svg {
            position: absolute;
            left: .75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            color: var(--muted);
            pointer-events: none;
        }
        .toolbar-search input {
            width: 100%;
            padding: .5rem .8rem .5rem 2.2rem;
            font-family: 'DM Mono', monospace;
            font-size: .76rem;
            color: var(--text);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
            cursor: none;
            transition: border-color .25s;
        }
        .toolbar-search input::placeholder { color: var(--muted); }
        .toolbar-search input:focus { border-color: var(--accent); }

        /* Sort dropdown */
        .sort-wrap { position: relative; }
        .sort-toggle {
            display: flex;
            align-items: center;
            gap: .4rem;
            padding: .5rem .9rem;
            font-family: 'DM Mono', monospace;
            font-size: .76rem;
            font-weight: 600;
            color: var(--muted);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: none;
            transition: all .25s ease;
            white-space: nowrap;
        }
        .sort-toggle:hover, .sort-toggle.open {
            border-color: var(--accent);
            color: var(--accent);
        }
        .sort-toggle svg { width: 14px; height: 14px; }
        .sort-dropdown {
            position: absolute;
            top: calc(100% + .5rem);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: .5rem;
            min-width: 160px;
            box-shadow: 0 12px 40px rgba(0,0,0,.25);
            opacity: 0;
            transform: translateY(-8px) scale(.96);
            pointer-events: none;
            transition: opacity .25s ease, transform .25s ease;
            z-index: 20;
        }
        .sort-dropdown.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .sort-option {
            display: block;
            width: 100%;
            padding: .5rem .85rem;
            font-family: 'DM Mono', monospace;
            font-size: .74rem;
            font-weight: 600;
            color: var(--muted);
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: none;
            text-align: left;
            transition: all .2s ease;
        }
        .sort-option:hover {
            background: rgba(59,130,246,.08);
            color: var(--accent);
        }
        .sort-option.active {
            background: var(--gradient-btn);
            color: #fff;
        }
        [data-theme="light"] .sort-dropdown {
            box-shadow: 0 12px 40px rgba(0,0,0,.1);
        }

        /* Count row */
        .count-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }
        .projects-count {
            font-family: 'DM Mono', monospace;
            font-size: .72rem;
            color: var(--muted);
        }
        .projects-count strong {
            color: var(--text);
            font-weight: 700;
        }

        #allProjects .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        /* Slightly tighter body/footer padding in 3-col layout */
        #allProjects .project-body   { padding: 1.4rem 1.4rem 1rem; }
        #allProjects .project-footer { padding: .75rem 1.4rem; }

        /* All cards visible on this page — no hidden-card behavior */
        #allProjects .project-card.hidden-card {
            display: flex !important;
        }

        /* No-results state */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: .85rem;
            line-height: 1.7;
            border: 1px dashed var(--border);
            border-radius: 1rem;
            background: var(--surface);
        }
        .no-results .nr-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: .5rem;
        }
        .no-results .nr-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            display: block;
            margin-bottom: .3rem;
        }

        @media (max-width: 760px) {
            body { padding-top: 4.5rem; }
            .projects-page-header { padding: 0 16px; }
            #allProjects { padding: 0 16px 5rem; }
            #allProjects .projects-grid { grid-template-columns: 1fr; gap: 1rem; }
        }

        @media (max-width: 480px) {
            body { padding-top: 4rem; }
            .projects-page-header h1 { font-size: 1.4rem; }
            .footer-bottom { padding-bottom: 4rem; }

            /* ── Single-row toolbar ── */
            .toolbar-row { flex-wrap: nowrap; gap: .4rem; }
            .toolbar-search { min-width: 0; }
            .sort-toggle { font-size: .62rem; padding: .38rem .5rem; white-space: nowrap; }
            .sort-option { font-size: .65rem; padding: .38rem .65rem; }
            .sort-dropdown { min-width: 130px; right: 0; left: auto; }
        }

    </style>
</head>

    <script>
        

        /* THEME TOGGLE — handled by theme-toggle.js */

        /* CUSTOM CURSOR */
        (function () {
            const cur = document.getElementById('cursor');
            const ring = document.getElementById('cursorRing');
            if (!cur || !ring) return;
            let mx = 0, my = 0, rx = 0, ry = 0;
            document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
            (function tick() {
                cur.style.transform = `translate(${mx - 6}px,${my - 6}px)`;
                rx += (mx - rx) * .12; ry += (my - ry) * .12;
                ring.style.transform = `translate(${rx - 18}px,${ry - 18}px)`;
                requestAnimationFrame(tick);
            })();
            document.querySelectorAll('a,button,.project-card,.theme-btn,.filter-toggle,.filter-option,.sort-toggle,.sort-option,input').forEach(el => {
                el.addEventListener('mouseenter', () => { ring.style.width = '52px'; ring.style.height = '52px'; });
                el.addEventListener('mouseleave', () => { ring.style.width = '36px'; ring.style.height = '36px'; });
            });
        })();

        /* REVEAL ON SCROLL */
        function attachReveal() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
                });
            }, { threshold: .15 });
            document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        }
        attachReveal();

        /* ===== SEARCH + SORT + FILTER — initialised after dynamic cards load ===== */
        let _uiAbort = null; // AbortController for clean listener teardown on refresh

        function initProjectsUI(allCards) {
            /* Abort previous listeners so they don't pile up on refresh */
            if (_uiAbort) _uiAbort.abort();
            _uiAbort = new AbortController();
            const sig = { signal: _uiAbort.signal };

            const grid = document.getElementById('allProjectsGrid');
            const originalOrder = [...allCards];
            let activeFilter = 'all';
            let activeSort = 'newest';
            let searchQuery = '';

            /* Restore active filter/sort from DOM (in case of refresh) */
            const activeFilterOpt = document.querySelector('.filter-option.active');
            if (activeFilterOpt) activeFilter = activeFilterOpt.dataset.filter;
            const activeSortOpt = document.querySelector('.sort-option.active');
            if (activeSortOpt) activeSort = activeSortOpt.dataset.sort;
            const searchInput = document.getElementById('projectSearch');
            if (searchInput.value.trim()) searchQuery = searchInput.value.trim().toLowerCase();

            /* --- Filter --- */
            const filterToggle = document.getElementById('filterToggle');
            const filterDD = document.getElementById('filterDropdown');
            const filterOpts = filterDD.querySelectorAll('.filter-option');

            filterToggle.addEventListener('click', () => {
                const isOpening = !filterDD.classList.contains('show');
                filterDD.classList.toggle('show');
                filterToggle.classList.toggle('open');
                sortDD.classList.remove('show');
                sortToggle.classList.remove('open');

                if (isOpening) {
                    const toggleRect = filterToggle.getBoundingClientRect();
                    const ddWidth = Math.max(filterDD.offsetWidth, 160);
                    if (toggleRect.left + ddWidth > window.innerWidth - 8) {
                        filterDD.style.left = 'auto';
                        filterDD.style.right = '0';
                    } else {
                        filterDD.style.left = '0';
                        filterDD.style.right = 'auto';
                    }
                }
            }, sig);

            filterOpts.forEach(opt => {
                opt.addEventListener('click', () => {
                    filterOpts.forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    activeFilter = opt.dataset.filter;
                    filterDD.classList.remove('show');
                    filterToggle.classList.remove('open');
                    applyAll();
                }, sig);
            });

            /* --- Sort --- */
            const sortToggle = document.getElementById('sortToggle');
            const sortDD = document.getElementById('sortDropdown');
            const sortOpts = sortDD.querySelectorAll('.sort-option');

            sortToggle.addEventListener('click', () => {
                sortDD.classList.toggle('show');
                sortToggle.classList.toggle('open');
                filterDD.classList.remove('show');
                filterToggle.classList.remove('open');
            }, sig);

            sortOpts.forEach(opt => {
                opt.addEventListener('click', () => {
                    sortOpts.forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    activeSort = opt.dataset.sort;
                    sortDD.classList.remove('show');
                    sortToggle.classList.remove('open');
                    applyAll();
                }, sig);
            });

            /* --- Close dropdowns on outside click --- */
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.filter-wrap')) {
                    filterDD.classList.remove('show');
                    filterToggle.classList.remove('open');
                }
                if (!e.target.closest('.sort-wrap')) {
                    sortDD.classList.remove('show');
                    sortToggle.classList.remove('open');
                }
            }, sig);

            /* --- Search --- */
            let debounceTimer;
            searchInput.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchQuery = searchInput.value.trim().toLowerCase();
                    applyAll();
                }, 200);
            }, sig);

            /* --- Apply filter + sort + search --- */
            function applyAll() {
                let visible = [...originalOrder];

                if (activeFilter !== 'all') {
                    visible = visible.filter(c => c.dataset.category === activeFilter);
                }

                if (searchQuery) {
                    visible = visible.filter(c => {
                        const title = (c.querySelector('.project-title')?.textContent || '').toLowerCase();
                        const desc = (c.querySelector('.project-desc')?.textContent || '').toLowerCase();
                        const stack = (c.querySelector('.project-stack')?.textContent || '').toLowerCase();
                        return title.includes(searchQuery) || desc.includes(searchQuery) || stack.includes(searchQuery);
                    });
                }

                // 4. Sort
                if (activeSort === 'newest') {
                    visible.sort((a, b) => {
                        const ra = parseFloat(a.dataset.rank);
                        const rb = parseFloat(b.dataset.rank);
                        const rankA = Number.isFinite(ra) ? ra : 9999;
                        const rankB = Number.isFinite(rb) ? rb : 9999;
                        if (rankA !== rankB) return rankA - rankB;
                        return new Date(b.dataset.updated) - new Date(a.dataset.updated);
                    });
                } else if (activeSort === 'oldest') {
                    visible.sort((a, b) => {
                        return new Date(a.dataset.updated) - new Date(b.dataset.updated);
                    });
                } else if (activeSort === 'a-z') {
                    visible.sort((a, b) => {
                        const ta = a.querySelector('.project-title')?.textContent || '';
                        const tb = b.querySelector('.project-title')?.textContent || '';
                        return ta.localeCompare(tb);
                    });
                } else if (activeSort === 'z-a') {
                    visible.sort((a, b) => {
                        const ta = a.querySelector('.project-title')?.textContent || '';
                        const tb = b.querySelector('.project-title')?.textContent || '';
                        return tb.localeCompare(ta);
                    });
                }

                const hasActiveQuery = searchQuery || activeFilter !== 'all';
                grid.classList.toggle('searching', hasActiveQuery);

                const hiddenSet = new Set(allCards);
                visible.forEach(c => hiddenSet.delete(c));
                hiddenSet.forEach(c => { c.style.display = 'none'; });

                const oldNR = grid.querySelector('.no-results');
                if (oldNR) oldNR.remove();

                if (!visible.length) {
                    const nr = document.createElement('div');
                    nr.className = 'no-results';
                    nr.innerHTML = `<span class="nr-icon">🔍</span><span class="nr-title">No projects found</span>Try a different search term or filter.`;
                    grid.appendChild(nr);
                } else {
                    visible.forEach((c, i) => {
                        c.style.display = '';
                        c.style.opacity = '0';
                        c.style.transform = 'translateY(20px)';
                        grid.appendChild(c);
                        requestAnimationFrame(() => {
                            c.style.transition = `opacity .4s ease ${i * .06}s, transform .4s ease ${i * .06}s`;
                            c.style.opacity = '1';
                            c.style.transform = 'translateY(0)';
                        });
                    });
                }

                applyPagination(visible, hasActiveQuery);
            }

            /* ── Show More / Show Less (4-card limit) ── */
            const SHOW_LIMIT = 4;
            let isExpanded = false;
            let _lastVisible = [];
            const showMoreBtn = document.getElementById('projectsShowMore');

            function applyPagination(visibleCards, hasActive) {
                _lastVisible = visibleCards;
                const countEl = document.getElementById('projectsCount');

                if (hasActive) {
                    /* Active search/filter — show all results, hide button */
                    visibleCards.forEach(c => { if (c.style.display === 'none') c.style.display = ''; });
                    if (showMoreBtn) showMoreBtn.style.display = 'none';
                    if (countEl) countEl.innerHTML = `Showing <strong>${visibleCards.length}</strong> project${visibleCards.length !== 1 ? 's' : ''}`;
                    return;
                }

                const showAll = isExpanded || visibleCards.length <= SHOW_LIMIT;
                visibleCards.forEach((c, i) => { c.style.display = showAll || i < SHOW_LIMIT ? '' : 'none'; });

                if (showMoreBtn) {
                    if (visibleCards.length <= SHOW_LIMIT) {
                        showMoreBtn.style.display = 'none';
                    } else if (isExpanded) {
                        showMoreBtn.style.display = '';
                        showMoreBtn.innerHTML = 'Show Less ↑';
                    } else {
                        showMoreBtn.style.display = '';
                        showMoreBtn.innerHTML = `Show More <span style="opacity:.55;font-size:.82em">(${visibleCards.length - SHOW_LIMIT} more)</span> ↓`;
                    }
                }

                const shown = showAll ? visibleCards.length : SHOW_LIMIT;
                if (countEl) countEl.innerHTML = shown < visibleCards.length
                    ? `Showing <strong>${shown}</strong> of <strong>${visibleCards.length}</strong> project${visibleCards.length !== 1 ? 's' : ''}`
                    : `Showing <strong>${visibleCards.length}</strong> project${visibleCards.length !== 1 ? 's' : ''}`;
            }

            if (showMoreBtn) {
                showMoreBtn.addEventListener('click', () => {
                    isExpanded = !isExpanded;
                    const hasActive = searchQuery || activeFilter !== 'all';
                    applyPagination(_lastVisible, hasActive);
                    if (!isExpanded) {
                        document.getElementById('allProjects').scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, sig);
            }

            /* Apply immediately to respect current filter/sort/search state */
            applyAll();
        } // end initProjectsUI

        

        /* ===== GITHUB: Load all portfolio projects + AUTO-REFRESH ===== */
        (function () {
            const grid = document.getElementById('allProjectsGrid');
            if (!grid) return;

            let lastHash = '';  // fingerprint to detect changes

            /* Build a simple hash from project data to detect changes */
            function projectsHash(projects) {
                return projects.map(p => `${p.name}|${p.rank}|${p.category}|${p.completed}|${p.stack.join(',')}`).join(';;');
            }

            /* Render projects into the grid and init UI */
            function renderProjects(projects) {
                if (!projects.length) {
                    grid.innerHTML = `<div class="no-results"><span class="nr-icon">📭</span><span class="nr-title">No projects found</span>Tag your GitHub repos with <code>portfolio</code> to show them here.</div>`;
                    document.getElementById('projectsCount').innerHTML = 'Showing <strong>0</strong> projects';
                    return;
                }

                grid.innerHTML = projects.map(p => buildProjectCard(p)).join('');
                attachReveal();

                /* Attach cursor hover */
                grid.querySelectorAll('a, .project-card').forEach(el => {
                    el.addEventListener('mouseenter', () => { const r = document.getElementById('cursorRing'); if (r) { r.style.width = '52px'; r.style.height = '52px'; } });
                    el.addEventListener('mouseleave', () => { const r = document.getElementById('cursorRing'); if (r) { r.style.width = '36px'; r.style.height = '36px'; } });
                });

                const allCards = Array.from(grid.querySelectorAll('.project-card'));
                document.getElementById('projectsCount').innerHTML =
                    `Showing <strong>${allCards.length}</strong> project${allCards.length !== 1 ? 's' : ''}`;
                initProjectsUI(allCards);
            }

            /* Fetch, sort, and render (or refresh) */
            async function loadProjects(showSkeletons) {
                if (showSkeletons) {
                    grid.innerHTML = buildSkeletons(6);
                    document.getElementById('projectsCount').innerHTML = 'Loading projects...';
                }

                try {
                    const projects = await fetchPortfolioProjects();
                    projects.sort((a, b) => a.rank - b.rank || new Date(b.updatedAt) - new Date(a.updatedAt));

                    const hash = projectsHash(projects);
                    if (hash === lastHash) return; // nothing changed
                    lastHash = hash;

                    renderProjects(projects);
                } catch (err) {
                    if (showSkeletons) {
                        console.warn('GitHub fetch failed:', err);
                        grid.innerHTML = `<div class="no-results"><span class="nr-icon">⚠️</span><span class="nr-title">Could not load projects</span>${err.message}</div>`;
                        document.getElementById('projectsCount').innerHTML = 'Showing <strong>0</strong> projects';
                    }
                }
            }

            /* Initial load with skeletons */
            loadProjects(true);

            /* Auto-refresh: re-fetch when user returns to the tab */
            let refreshCooldown = false;
            function autoRefresh() {
                if (refreshCooldown) return;
                refreshCooldown = true;
                /* Small delay so GitHub API has time to propagate changes */
                setTimeout(() => {
                    console.log('[Projects] Auto-refreshing...');
                    loadProjects(false).then(() => {
                        refreshCooldown = false;
                    });
                }, 1500);
            }

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) autoRefresh();
            });
            window.addEventListener('focus', autoRefresh);

            /* Background poll every 2 minutes */
            setInterval(() => loadProjects(false), 2 * 60 * 1000);


        })();
    </script>
    <script src="/js/visit-counter.js"></script>
</body>

</html>
