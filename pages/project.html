    <style>
        body { padding-top: 5rem; }

        .pd-wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 24px 6rem;
        }

        /* Back button */
        .pd-back {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            font-family: 'DM Mono', monospace;
            font-size: .75rem;
            font-weight: 600;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 1.8rem;
            transition: color .25s;
        }
        .pd-back:hover { color: var(--text); }
        .pd-back svg { width: 14px; height: 14px; }

        /* Hero image */
        .pd-img-wrap {
            position: relative;
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: var(--surface);
            margin-bottom: 1.8rem;
            aspect-ratio: 16 / 8;
        }
        .pd-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        /* Status badge — in title row, NOT overlapping the image */
        .pd-status {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            padding: .28rem .75rem;
            border-radius: 5px;
            background: rgba(255, 100, 100, .12);
            border: 1px solid rgba(255, 100, 100, .3);
            font-family: 'DM Mono', monospace;
            font-size: .6rem;
            font-weight: 700;
            color: #f87171;
            letter-spacing: .04em;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .pd-status::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #f87171;
            animation: statusPulse 1.5s ease-in-out infinite;
        }
        .pd-status.completed {
            background: rgba(20, 184, 166, .12);
            border-color: rgba(20, 184, 166, .3);
            color: #14b8a6;
            box-shadow: 0 0 8px rgba(20,184,166,.12);
        }
        .pd-status.completed::before {
            background: #14b8a6;
            animation: none;
        }

        /* Title row */
        .pd-title-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: .7rem;
            margin-bottom: .6rem;
        }
        .pd-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text);
            line-height: 1.1;
        }

        /* Type pills */
        .pd-type-pill {
            font-family: 'DM Mono', monospace;
            font-size: .58rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .22rem .65rem;
            border-radius: 4px;
            white-space: nowrap;
        }
        .type-client { background: rgba(59,130,246,.12); border: 1px solid rgba(59,130,246,.28); color: #60a5fa; }
        .type-personal { background: rgba(20,184,166,.1); border: 1px solid rgba(20,184,166,.28); color: #14b8a6; }
        .type-oss { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.28); color: #f59e0b; }
        .type-hack { background: rgba(168,85,247,.1); border: 1px solid rgba(168,85,247,.28); color: #a855f7; }
        [data-theme="light"] .type-client { color: #2563eb; }
        [data-theme="light"] .type-personal { color: #0d9488; }
        [data-theme="light"] .type-oss { color: #d97706; }
        [data-theme="light"] .type-hack { color: #9333ea; }

        /* Meta row */
        .pd-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
            font-family: 'DM Mono', monospace;
            font-size: .72rem;
            color: var(--muted);
        }
        .pd-meta span { display: flex; align-items: center; gap: .3rem; }
        .pd-meta svg { width: 13px; height: 13px; }

        /* Divider */
        .pd-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.2rem 0;
        }

        /* Description */
        .pd-desc {
            color: var(--muted);
            font-size: .9rem;
            line-height: 1.75;
            margin-bottom: 1.6rem;
        }

        /* Tech section */
        .pd-section-label {
            font-family: 'DM Mono', monospace;
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: .75rem;
        }

        /* Tech icons row */
        .pd-tech-icons {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            margin-bottom: 1.6rem;
        }
        .pd-tech-icon {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px;
            object-fit: contain;
            transition: transform .2s, border-color .2s;
        }
        .pd-tech-icon:hover { transform: scale(1.15); border-color: var(--accent); }
        [data-theme="light"] .pd-tech-icon { background: rgba(0,0,0,.03); border-color: rgba(0,0,0,.12); }

        /* Stack tags (topics without icons) */
        .pd-tags {
            display: flex;
            flex-wrap: wrap;
            gap: .45rem;
            margin-bottom: 2rem;
        }
        .pd-tag {
            font-family: 'DM Mono', monospace;
            font-size: .67rem;
            font-weight: 600;
            padding: .28rem .7rem;
            border-radius: 999px;
            background: rgba(59,130,246,.07);
            color: var(--accent);
            border: 1px solid rgba(59,130,246,.18);
        }

        /* CTA buttons */
        .pd-actions {
            display: flex;
            gap: .85rem;
            flex-wrap: wrap;
        }
        .pd-btn {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            text-decoration: none;
            font-family: 'DM Mono', monospace;
            font-size: .8rem;
            font-weight: 700;
            padding: .65rem 1.3rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            color: var(--text);
            transition: border-color .25s, color .25s, background .25s, transform .2s;
        }
        .pd-btn:hover { transform: translateY(-2px); }
        .pd-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .pd-btn-gh:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(20,184,166,.06); }
        .pd-btn-live { border-color: var(--accent); color: var(--accent); }
        .pd-btn-live:hover { background: rgba(59,130,246,.08); }

        /* Error / loading states */
        .pd-loading, .pd-error {
            text-align: center;
            padding: 5rem 2rem;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            font-size: .85rem;
        }
        .pd-error-icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
        .pd-error-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); display: block; margin-bottom: .3rem; }

        @media (max-width: 600px) {
            body { padding-top: 4.5rem; }
            .pd-title { font-size: 1.3rem; }
        }

    <script>
        /* ── Constants ── */
        const GH_USER = 'RajHarsh03';

        const TECH_ICON_MAP = {
            'react': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg',
            'reactjs': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg',

            'tensorflow': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/tensorflow/tensorflow-original.svg',
            'mongodb': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mongodb/mongodb-original.svg',

            'html': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg',
            'css3': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg',
            'css': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg',
            'tailwind': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/tailwindcss/tailwindcss-original.svg',
            'tailwindcss': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/tailwindcss/tailwindcss-original.svg',
            'nextjs': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nextjs/nextjs-original.svg',
            'next': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nextjs/nextjs-original.svg',
            'express': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/express/express-original.svg',
            'expressjs': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/express/express-original.svg',
            'git': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg',
            'docker': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg',
            'fastapi': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/fastapi/fastapi-original.svg',
            'flask': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/flask/flask-original.svg',
            'postgresql': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/postgresql/postgresql-original.svg',
            'postgres': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/postgresql/postgresql-original.svg',
            'java': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg',
            'aws': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/amazonwebservices/amazonwebservices-plain-wordmark.svg',
            'firebase': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/firebase/firebase-plain.svg',
            'redis': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/redis/redis-original.svg',
            'graphql': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/graphql/graphql-plain.svg',
            'vue': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vuejs/vuejs-original.svg',
            'vuejs': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vuejs/vuejs-original.svg',
            'bootstrap': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/bootstrap/bootstrap-original.svg',
            'numpy': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/numpy/numpy-original.svg',
            'keras': 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/keras/keras-original.svg',
        };

        const TYPE_MAP = {
            'client': { label: 'Client Project', cls: 'type-client' },
            'client-project': { label: 'Client Project', cls: 'type-client' },
            'personal': { label: 'Personal Project', cls: 'type-personal' },
            'personal-project': { label: 'Personal Project', cls: 'type-personal' },
            'freelance': { label: 'Freelance', cls: 'type-client' },
            'open-source': { label: 'Open Source', cls: 'type-oss' },
            'hackathon': { label: 'Hackathon', cls: 'type-hack' },
        };

        const META_SKIP = new Set([
            'portfolio', 'completed', 'in-progress', 'live',
            'frontend', 'fullstack', 'full-stack', 'ai', 'ml',
            'machine-learning', 'deep-learning', 'backend',
            ...Object.keys(TYPE_MAP),
        ]);

        /* ── Read slug from URL ── */
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const slug = pathParts[pathParts.length - 1]; // e.g. "emechanicz"

        /* ── Helpers ── */
        function timeAgo(dateStr) {
            const diff = Date.now() - new Date(dateStr);
            const days = Math.floor(diff / 86400000);
            if (days === 0) return 'today';
            if (days === 1) return 'yesterday';
            if (days < 30) return `${days}d ago`;
            const months = Math.floor(days / 30);
            if (months < 12) return `${months}mo ago`;
            return `${Math.floor(months / 12)}y ago`;
        }

        /* ── Render ── */
        function render(r) {
            const topics = r.topics || [];
            const imgUrl = `https://opengraph.github.com/repo/${GH_USER}/${r.name}`;
            const completed = topics.includes('completed') || topics.includes('live');
            const live = r.homepage && r.homepage.trim() ? r.homepage.trim() : null;
            const name = r.name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

            // Type pill
            let typePill = '';
            for (const t of topics) {
                if (TYPE_MAP[t]) {
                    typePill = `<span class="pd-type-pill ${TYPE_MAP[t].cls}">${TYPE_MAP[t].label}</span>`;
                    break;
                }
            }

            // Tech icons
            const techIcons = topics
                .filter(t => TECH_ICON_MAP[t])
                .map(t => `<img class="pd-tech-icon" src="${TECH_ICON_MAP[t]}" alt="${t}" title="${t}" loading="lazy">`)
                .join('');

            // Stack tags (remaining topics without icons)
            const tags = topics
                .filter(t => !META_SKIP.has(t) && !TECH_ICON_MAP[t] && !/^rank-\d+$/i.test(t))
                .map(t => `<span class="pd-tag">${t.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' ')}</span>`)
                .join('');

            // Update page title
            document.title = `${name} — harshx.in`;

            const statusCls = completed ? 'pd-status completed' : 'pd-status';
            const statusTxt = completed ? 'Completed' : 'In Progress';

            const wrap = document.getElementById('pdWrap');
            wrap.innerHTML = `
                <a class="pd-back" href="/projects">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                    Back to Projects
                </a>

                <div class="pd-img-wrap">
                    <img src="${imgUrl}" alt="${name} preview" />
                </div>

                <div class="pd-title-row">
                    <h1 class="pd-title">${name}</h1>
                    <div class="${statusCls}">${statusTxt}</div>
                    ${typePill}
                </div>

                <div class="pd-meta">
                    <span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        ${r.stargazers_count} star${r.stargazers_count !== 1 ? 's' : ''}
                    </span>
                    <span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 01-9 9"/></svg>
                        ${r.forks_count} fork${r.forks_count !== 1 ? 's' : ''}
                    </span>
                    ${r.language ? `<span>${r.language}</span>` : ''}
                    <span>Updated ${timeAgo(r.pushed_at)}</span>
                </div>

                <hr class="pd-divider" />

                <p class="pd-desc">${r.description || 'No description provided.'}</p>

                ${techIcons ? `
                    <div class="pd-section-label">Technologies</div>
                    <div class="pd-tech-icons">${techIcons}</div>
                ` : ''}

                ${tags ? `<div class="pd-tags">${tags}</div>` : ''}

                <div class="pd-actions">
                    <a class="pd-btn pd-btn-gh" href="${r.html_url}" target="_blank" rel="noopener">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                        View on GitHub
                    </a>
                    ${live ? `
                    <a class="pd-btn pd-btn-live" href="${live}" target="_blank" rel="noopener">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        Live Preview
                    </a>` : ''}
                </div>
            `;
        }

        function showError(msg) {
            document.getElementById('pdWrap').innerHTML = `
                <a class="pd-back" href="/projects">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                    Back to Projects
                </a>
                <div class="pd-error">
                    <span class="pd-error-icon">🔍</span>
                    <span class="pd-error-title">Project not found</span>
                    ${msg}
                </div>`;
        }

        /* ── Fetch & render with localStorage cache ── */
        if (!slug || slug === 'projects') {
            window.location.href = '/projects';
        } else {
            const CACHE_KEY = `gh_proj_${slug}`;
            const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 hours

            /* Try cache first */
            try {
                const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
                if (cached && Date.now() - cached.ts < CACHE_TTL) {
                    render(cached.data);
                    return; /* skip fetch */
                }
            } catch (e) {}

            fetch(`https://api.github.com/repos/${GH_USER}/${slug}`, {
                headers: { Accept: 'application/vnd.github+json' }
            })
            .then(r => {
                if (r.status === 403) throw new Error('GitHub API rate limited — please try again in a minute.');
                if (r.status === 404) throw new Error('Repo not found.');
                if (!r.ok) throw new Error(`GitHub error (${r.status})`);
                return r.json();
            })
            .then(data => {
                try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch (e) {}
                render(data);
            })
            .catch(err => showError(err.message));
        }

        /* ── Cursor ── */
        (function () {
            const cur = document.getElementById('cursor');
            const ring = document.getElementById('cursorRing');
            if (!cur || !ring) return;
            let mx = 0, my = 0, rx = 0, ry = 0;
            document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
            (function tick() {
                cur.style.transform = `translate(${mx - 6}px,${my - 6}px)`;
                rx += (mx - rx) * .12; ry += (my - ry) * .12;
                ring.style.transform = `translate(${rx - 18}px,${ry - 18}px)`;
                requestAnimationFrame(tick);
            })();
        })();
    </script>
    <script src="/js/visit-counter.js"></script>
</body>

</html>
